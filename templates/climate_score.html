<!DOCTYPE html>
<html>
<head>
    <title>Climate Score Analyzer</title>
</head>
<body>

<h2>🌍 Climate Score Analyzer</h2>

<form method="POST">

    <label>Temperature (°C):</label>
    <input type="number" name="temperature" required><br><br>

    <label>Humidity (%):</label>
    <input type="number" name="humidity" required><br><br>

    <label>Rainfall (mm):</label>
    <input type="number" name="rainfall" required><br><br>

    <label>Wind Speed (km/h):</label>
    <input type="number" name="wind_speed" required><br><br>

    <button type="submit">Check Climate Score</button>

</form>

{% if score %}
    <h3>Climate Score: {{ score }}/100</h3>
    <h3>{{ status }}</h3>
{% endif %}

</body>
</html>
